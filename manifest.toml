packaging_format = 2

id = "mkstartside"
name = "MK Startside"
description.en = "Personal start page with weather, calendar, RSS and links"
description.da = "Personlig startside med vejr, kalender, RSS og links"

version = "1.0~ynh1"

maintainers = []

[upstream]
license = "AGPL-3.0-only"

[integration]
yunohost = ">= 11.2"
helpers_version = "2.1"
architectures = "all"
multi_instance = false
ldap = false
sso = false
disk = "100M"
ram.build = "100M"
ram.runtime = "50M"

[install]

    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/startside"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.system_user]

    [resources.install_dir]
    dir = "/var/www/__APP__"

    [resources.data_dir]
    dir = "/home/yunohost.app/__APP__"

    [resources.ports]
    main.default = 8765

    [resources.permissions]
    main.url = "/"
    main.auth_header = false

    [resources.apt]
    packages = "python3, python3-venv, python3-pip"
